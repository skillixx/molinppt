services:
  ppt-ai-app:
    build:
      context: ./ppt-ai-app
    environment:
      APP_ENV: production
      APP_PORT: 5177
      MOLING_API_BASE_URL: ${MOLING_API_BASE_URL}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      MOLING_APP_ID: ${MOLING_APP_ID}
      MOLING_PRODUCT_ID: ${MOLING_PRODUCT_ID}
      MOLING_DEFAULT_ENTITLEMENT_ID: ${MOLING_DEFAULT_ENTITLEMENT_ID}
      SESSION_COOKIE_SECURE: true
      DATABASE_URL: ${DATABASE_URL:-json:/data/ppt-ai-db.json}
      STORAGE_DIR: /data/storage
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-0}
      APP_BASE_URL: ${APP_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${APP_PORT:-5177}:5177"
    volumes:
      - ppt_ai_prod_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5177/api/health').then((r) => {if (!r.ok) process.exit(1);})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ppt_ai_prod_data:
